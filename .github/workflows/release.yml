name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          # tag: v2.4.0 → version: 2.4.0
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Build macOS App
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          SIGN_IDENTITY: '-'
          TARGET_ARCH: arm64
        run: |
          bash scripts/build_macos_app.sh

      - name: Generate release notes
        id: notes
        run: |
          # 提取上一个 tag 到当前 tag 之间的 commit log
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | awk -v tag="$TAG" '$0 != tag { print; exit }')

          if [ -n "$PREV_TAG" ]; then
            RAW_COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s" --no-merges --invert-grep --grep='^release: update ')
          else
            RAW_COMMITS=$(git log -10 --pretty=format:"%s" --no-merges --invert-grep --grep='^release: update ')
          fi

          export RAW_COMMITS
          NOTES=$(python3 - <<'PY'
          import os
          import re

          localized = {
              "include release notes in update manifest": "升级弹窗现在会显示本次更新内容。",
              "format update release notes for display": "优化升级弹窗展示，只显示本次版本更新内容。",
              "expand titlebar zoom hit area": "扩大顶部标题栏双击放大的响应区域。",
          }
          hidden = {
              "align checked-in update notes",
          }

          items = []
          for raw in os.environ.get("RAW_COMMITS", "").splitlines():
              text = raw.strip()
              if not text:
                  continue
              text = re.sub(r"^(feat|fix|chore|docs|style|refactor|perf|test)(\([^)]+\))?:\s*", "", text, flags=re.I).strip()
              if text.lower() in hidden:
                  continue
              text = localized.get(text.lower(), text)
              if text and text not in items:
                  items.append(text)

          print("\n".join(items))
          PY
          )

          if [ -z "$NOTES" ]; then
            NOTES="本次发布仅更新构建资产。"
          fi

          # 写入多行 output
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "app_notes<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

          BULLETS=$(printf '%s\n' "$NOTES" | sed 's/^/- /')

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          echo "## 且慢主理人看板 ${{ steps.version.outputs.tag }}" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$BULLETS" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "---" >> "$GITHUB_OUTPUT"
          echo "🤖 自动构建 by GitHub Actions" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Compute sha256 and generate latest.json
        id: manifest
        env:
          BODY: ${{ steps.notes.outputs.app_notes }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          ZIP_NAME="QiemanDashboard-${VERSION}.zip"
          ZIP_PATH="/tmp/${ZIP_NAME}"
          ZIP_SIZE=$(stat -f%z "$ZIP_PATH")
          SHA256=$(shasum -a 256 "$ZIP_PATH" | cut -d' ' -f1)
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP_NAME}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"

          export TAG VERSION ZIP_NAME ZIP_SIZE SHA256 DOWNLOAD_URL RELEASE_URL BODY
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          payload = {
              "version": os.environ["VERSION"],
              "tag": os.environ["TAG"],
              "asset": {
                  "name": os.environ["ZIP_NAME"],
                  "download_url": os.environ["DOWNLOAD_URL"],
                  "size": int(os.environ["ZIP_SIZE"]),
                  "content_type": "application/zip",
                  "sha256": os.environ["SHA256"],
              },
              "sha256": os.environ["SHA256"],
              "notes": os.environ["BODY"],
              "html_url": os.environ["RELEASE_URL"],
              "published_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              # Backward-compatible fields for existing AppUpdateChecker
              "tag_name": os.environ["TAG"],
              "name": f"QiemanDashboard {os.environ['TAG']}",
              "body": os.environ["BODY"],
              "assets": [
                  {
                      "name": os.environ["ZIP_NAME"],
                      "browser_download_url": os.environ["DOWNLOAD_URL"],
                      "size": int(os.environ["ZIP_SIZE"]),
                      "content_type": "application/zip",
                  }
              ],
          }
          with open("/tmp/latest.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=4)
              f.write("\n")
          PY

          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: 且慢主理人看板 ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            /tmp/QiemanDashboard-${{ steps.version.outputs.version }}.zip
            /tmp/latest.json

      - name: Update latest.json on main branch
        env:
          BODY: ${{ steps.notes.outputs.app_notes }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          ZIP_NAME="QiemanDashboard-${VERSION}.zip"
          ZIP_PATH="/tmp/${ZIP_NAME}"
          ZIP_SIZE=$(stat -f%z "$ZIP_PATH")
          SHA256="${{ steps.manifest.outputs.sha256 }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP_NAME}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"

          git fetch origin main
          git switch -C main origin/main

          export TAG VERSION ZIP_NAME ZIP_SIZE SHA256 DOWNLOAD_URL RELEASE_URL BODY
          python3 - <<'PY'
          import json, os

          payload = {
              "version": os.environ["VERSION"],
              "tag": os.environ["TAG"],
              "asset": {
                  "name": os.environ["ZIP_NAME"],
                  "download_url": os.environ["DOWNLOAD_URL"],
                  "size": int(os.environ["ZIP_SIZE"]),
                  "content_type": "application/zip",
                  "sha256": os.environ["SHA256"],
              },
              "sha256": os.environ["SHA256"],
              "notes": os.environ["BODY"],
              "html_url": os.environ["RELEASE_URL"],
              "published_at": "",
              # Backward-compatible fields
              "tag_name": os.environ["TAG"],
              "name": f"QiemanDashboard {os.environ['TAG']}",
              "body": os.environ["BODY"],
              "assets": [
                  {
                      "name": os.environ["ZIP_NAME"],
                      "browser_download_url": os.environ["DOWNLOAD_URL"],
                      "size": int(os.environ["ZIP_SIZE"]),
                      "content_type": "application/zip",
                  }
              ],
          }

          with open("releases/macos/latest.json", "w", encoding="utf-8") as file:
              json.dump(payload, file, ensure_ascii=False, indent=4)
              file.write("\n")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/macos/latest.json
          git diff --cached --quiet || git commit -m "release: update ${TAG}"
          git push origin HEAD:main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
