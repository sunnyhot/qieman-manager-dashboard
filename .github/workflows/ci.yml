name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  swift:
    name: Swift build and tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Swift package
        run: swift build --package-path macos-app

      - name: Run Swift tests
        working-directory: macos-app
        run: swift test

      - name: Build native Qieman CLI
        run: bash scripts/build_qieman_cli.sh

      - name: Smoke test native Qieman CLI
        run: scripts/qieman version
